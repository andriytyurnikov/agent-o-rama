name: Etaoin E2E Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  etaoin:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Clojure
      uses: DeLaGuardo/setup-clojure@12.5
      with:
        lein: latest

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache Leiningen dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-lein-${{ hashFiles('project.clj') }}
        restore-keys: |
          ${{ runner.os }}-lein-

    - name: Cache Node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      run: |
        lein deps
        npm ci

    - name: Build frontend for Etaoin tests
      env:
        NODE_ENV: production
      run: |
        rm -rf resource/public
        mkdir -p resource/public
        cp -r resource/assets/* resource/public
        lein with-profile +ui run -m shadow.cljs.devtools.cli release :frontend

    - name: Run Etaoin E2E tests
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: lein with-profile +dev,+ui,+test test :ui
